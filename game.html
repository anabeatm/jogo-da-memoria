<!doctype html>
<html lang="pt-br" data-theme="light">
  <head>
    <title>Jogo da Memória</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="css/main.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <header>
      <h1>Olá, <span id="nomeJogador">pessoa</span>!</h1>
      <p>Tentativas: <span id="tentativas">0</span></p>
      <button id="jogarNovamente">Jogar Novamente</button>
      <button id="btnReiniciar">Reiniciar</button>
      <button id="btnAlterarTema">Alterar Tema</button>
    </header>
    <main id="game">
      <section id="timer">
        <p>Temporizador</p>
        <div id="display">00:00</div>
      </section>
      <section class="board"></section>
      <section id="rankingSection">
        <h2>🏆 Ranking</h2>
        <ol id="listaRanking">
          <li>Carregando...</li>
        </ol>
      </section>
    </main>

    <footer>
      <a id="voltar" href="index.html">Voltar</a>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
